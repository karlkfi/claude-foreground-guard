<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="shield" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#a78bfa"/>
      <stop offset="1" stop-color="#7e57c2"/>
    </linearGradient>
  </defs>
  <!-- shield + hourglass, centered: translate(76,31) scale(5) maps the 88-unit mark to a 512 canvas -->
  <g transform="translate(76,31) scale(5)">
    <path d="M36 2 L70 14 V44 C70 66 54 80 36 88 C18 80 2 66 2 44 V14 Z"
          fill="url(#shield)" stroke="#5b3da8" stroke-width="1.4"/>
    <!-- hourglass: time draining — the foreground poll that parks the main thread -->
    <g fill="#f1ecff">
      <rect x="19" y="24" width="34" height="5" rx="2.5"/>
      <rect x="19" y="63" width="34" height="5" rx="2.5"/>
      <path d="M23 30 H49 L36 46 Z M36 46 L49 62 H23 Z"/>
    </g>
  </g>
</svg>
